<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>OpenCV + MCP Demo</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-zinc-950 text-zinc-200 p-8">
    <div class="max-w-6xl mx-auto">
        <header class="mb-10 flex justify-between items-center border-b border-zinc-800 pb-4">
            <h1 class="text-xl font-mono text-blue-500">Demo Manipulación Imágenes con IA + Gemini</h1>
            <span class="text-xs bg-green-900 text-green-300 px-2 py-1 rounded">LIVE ON RAILWAY</span>
        </header>

        <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
            <div class="space-y-6">
                <section class="bg-zinc-900 p-5 rounded-lg border border-zinc-800">
                    <h2 class="text-sm font-bold mb-4 text-zinc-400 uppercase tracking-widest">Control de Entrada</h2>
                    <label class="text-xs text-zinc-500">Seleccionar Imagen de Muestra:</label>
                    <select id="fileSelect" onchange="updatePreview()" class="w-full bg-zinc-800 p-3 rounded mt-1 border border-zinc-700 outline-none focus:border-blue-500 transition-colors">
                        {% for file in files %}
                        <option value="{{ file }}">{{ file }}</option>
                        {% endfor %}
                    </select>
                </section>

                <section class="bg-zinc-900 p-5 rounded-lg border border-zinc-800">
                    <h2 class="text-sm font-bold mb-4 text-zinc-400 uppercase tracking-widest">Asistente IA (Gemini)</h2>
                    <textarea id="chatInput" placeholder="Ej: 'Aumenta el contraste y el brillo' o 'Pon la imagen borrosa'..." 
                              class="w-full bg-zinc-800 p-3 rounded h-32 text-sm border border-zinc-700 outline-none focus:border-blue-500 transition-colors resize-none"></textarea>
                    <button onclick="process()" id="btn" class="w-full bg-blue-700 hover:bg-blue-600 mt-4 py-3 rounded-md font-bold transition-all transform active:scale-95 flex justify-center items-center gap-2">
                        <span>EJECUTAR PROCESAMIENTO</span>
                    </button>
                </section>
            </div>

            <div class="lg:col-span-2">
                <div id="loading" class="hidden text-center py-4 text-blue-500 font-mono animate-pulse text-sm">
                    🚀 GEMINI PROCESANDO MATRIZ...
                </div>
                
                <div id="canvas" class="grid grid-cols-1 md:grid-cols-2 gap-4">
                    <div class="bg-zinc-900 p-2 rounded border border-zinc-800">
                        <p class="text-[10px] text-zinc-500 mb-2 font-mono uppercase">Imagen Original</p>
                        <img id="imgOrig" src="" class="w-full rounded border border-zinc-800">
                    </div>
                    <div class="bg-zinc-900 p-2 rounded border border-blue-900 shadow-[0_0_15px_rgba(30,58,138,0.2)]">
                        <p class="text-[10px] text-blue-500 mb-2 font-mono uppercase">Resultado de la IA</p>
                        <div class="relative min-h-[200px] flex items-center justify-center bg-zinc-950 rounded overflow-hidden">
                            <img id="imgProc" src="https://placehold.co/400x300/18181b/3b82f6?text=Esperando+Instrucciones" class="w-full transition-opacity duration-300">
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // Actualiza la miniatura de la izquierda al cambiar el selector
        function updatePreview() {
            const file = document.getElementById('fileSelect').value;
            if(file) {
                document.getElementById('imgOrig').src = `/image_samples/${file}`;
            }
        }

        // Cargar vista previa al iniciar la página
        window.onload = updatePreview;

async function process() {
            const btn = document.getElementById('btn');
            const loading = document.getElementById('loading');
            const chatInput = document.getElementById('chatInput');
            const imgProc = document.getElementById('imgProc');
            
            if(!chatInput.value.trim()) return alert("Escribe algo para la IA");

            btn.disabled = true;
            loading.classList.remove('hidden');
            // Estado de carga visual
            imgProc.src = "https://placehold.co/400x300/18181b/3b82f6?text=Procesando...";

            try {
                const res = await fetch('/ask-ai', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({
                        prompt: chatInput.value,
                        filename: document.getElementById('fileSelect').value
                    })
                });
                const data = await res.json();
                
                // Si el servidor detectó un error en la API (nuestro nuevo formato)
                if (data.error_message || !data.processed_b64) {
                    const msg = data.error_message || "Error desconocido";
                    // Mostramos el mensaje directamente en el lugar de la imagen
                    imgProc.src = `https://placehold.co/400x300/450a0a/ef4444?text=${encodeURIComponent(msg)}`;
                } else {
                    document.getElementById('imgProc').src = data.processed_b64;
                }
            } catch (e) {
                imgProc.src = "https://placehold.co/400x300/450a0a/ef4444?text=Error+de+Conexion";
            } finally {
                loading.classList.add('hidden');
                btn.disabled = false;
            }
        }
    </script>
</body>
</html>
